# Deploys the production Worker (mountain-heritage-org-prod).
#
# Triggers:
#   - A semver tag push (vX.Y.Z) — developer promotion via the /deploy skill.
#   - A push to main whose commit is a CMS edit (message contains "[cms]") —
#     trustee edits in /admin go live automatically. The workflow bumps the
#     patch version, tags it, and deploys.
#
# Plain developer pushes to main (no tag, no [cms]) do nothing here; they only
# update staging via Cloudflare's own Git build.
#
# For [cms] edits that add images, this also runs `npm run images` to downsize
# the originals and regenerate AVIF/WebP variants, commits them back to main,
# and tags/deploys the optimised tree — so production is never served an
# unoptimised upload. See docs/images.md.
#
# Requires repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID.
# See docs/deployment.md and docs/plans/prod-releases.md.
name: Deploy production

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)deploy, e.g. v1.2.3 — for rollbacks.'
        required: true

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  decide:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
      mode: ${{ steps.decide.outputs.mode }}
      ref: ${{ steps.decide.outputs.ref }}
    steps:
      - id: decide
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true"  >> "$GITHUB_OUTPUT"
            echo "mode=tag"      >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            echo "deploy=true"  >> "$GITHUB_OUTPUT"
            echo "mode=tag"      >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          elif printf '%s' "$MSG" | grep -q '\[cms\]'; then
            echo "deploy=true"  >> "$GITHUB_OUTPUT"
            echo "mode=cms"      >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: decide
    if: needs.decide.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.decide.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Compress-on-ingest for trustee uploads. If this CMS commit touched
      # public/uploads, regenerate downsized originals + AVIF/WebP variants and
      # commit them back to main (so the repo stays lean and the tag below
      # points at the optimised tree). The commit is marked [skip-optimise] so
      # neither this workflow nor optimise-images.yml re-triggers. See
      # docs/images.md.
      - name: Optimise uploaded images (CMS edits)
        if: needs.decide.outputs.mode == 'cms'
        run: |
          before='${{ github.event.before }}'
          if [ -z "$before" ] || ! git cat-file -e "${before}^{commit}" 2>/dev/null; then
            before=HEAD~1
          fi
          if git diff --name-only "$before" '${{ github.sha }}' | grep -q '^public/uploads/'; then
            npm run images
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/uploads
            if git diff --cached --quiet; then
              echo "Images already optimised; nothing to commit."
            else
              git commit -m "optimise images [skip-optimise]"
              git push origin HEAD:main
            fi
          else
            echo "No upload changes in this commit; skipping image optimisation."
          fi

      - name: Tag the patch release (CMS edits)
        if: needs.decide.outputs.mode == 'cms'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags --quiet
          latest=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          latest=${latest:-v0.0.0}
          ver=${latest#v}
          major=${ver%%.*}; rest=${ver#*.}; minor=${rest%%.*}; patch=${rest#*.}
          new="v${major}.${minor}.$((patch + 1))"
          echo "Tagging $new"
          git tag -a "$new" -m "content release $new"
          git push origin "$new"

      - run: npm run build

      - name: Deploy to production Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy the same build to a separate worker via an explicit name
          # override. The @astrojs/cloudflare adapter regenerates the wrangler
          # config and drops [env.*] blocks, so `--env production` would just
          # redeploy the staging worker. See docs/plans/prod-releases.md.
          command: deploy --name mountain-heritage-org-prod
