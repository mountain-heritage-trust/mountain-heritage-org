# Sveltia CMS configuration.
#
# This file defines what trustees can edit through the /admin UI. Field
# definitions here MUST stay in sync with the Astro schemas in
# `src/content.config.ts`. If you add or change a field there, update it here
# too — otherwise the CMS UI and the build will disagree.
#
# See docs/cms.md for setup, auth, and naming notes.

backend:
  name: github
  repo: mountain-heritage-trust/mountain-heritage-org
  branch: main
  # Custom auth shim. Trustees reach /admin only after Cloudflare Access
  # has authenticated them via Google. The shim at /admin/auth-callback
  # then returns a server-side bot GitHub token without a real OAuth
  # round trip — trustees never see a GitHub sign-in screen. See
  # docs/cms.md.
  base_url: https://mountain-heritage-org.remus-ddf.workers.dev
  auth_endpoint: admin/auth-callback
  # Only offer OAuth sign-in (the "Sign in with GitHub" flow that goes via
  # the auth shim above). This hides Sveltia's "Sign in with access token"
  # (personal access token) button so trustees only see the normal flow.
  auth_methods: [oauth]
  # Placeholder app_id. Sveltia silently falls back to a PAT prompt if
  # this is empty; the value isn't actually used because the auth shim
  # doesn't run a real OAuth flow.
  app_id: mht-cms-bot
  # Every CMS commit carries a "[cms]" marker. The production deploy
  # workflow watches for it and auto-publishes trustee edits (see
  # .github/workflows/deploy-production.yml). Do not remove the marker
  # without updating that workflow.
  commit_messages:
    create: 'content: create {{collection}} "{{slug}}" [cms]'
    update: 'content: update {{collection}} "{{slug}}" [cms]'
    delete: 'content: delete {{collection}} "{{slug}}" [cms]'
    uploadMedia: 'content: upload "{{path}}" [cms]'
    deleteMedia: 'content: delete "{{path}}" [cms]'

# Media uploads are written to /public/uploads/ so they are served as-is at
# /uploads/<file>. We do not run Astro image optimisation on user uploads.
media_folder: public/uploads
public_folder: /uploads

# Show a preview link on the dashboard.
site_url: https://www.mountain-heritage.org
display_url: https://www.mountain-heritage.org

collections:
  # Site-wide settings — singleton files trustees can edit
  - name: settings
    label: Site settings
    files:
      - name: banner
        label: Site banner
        file: src/content/settings/banner.json
        format: json
        description: 'A short message shown across the top of every page. Use it for closures, calls to action, event reminders. Untick "Show banner" to hide it again.'
        fields:
          - { label: Show banner, name: enabled, widget: boolean, default: false, hint: 'Tick to display the banner across the whole site. Untick to hide.' }
          - { label: Message, name: message, widget: string, required: false, hint: 'Keep it to one short sentence — banners work best when brief.' }
          - { label: Link text, name: linkText, widget: string, required: false, hint: 'Optional. Text on the call-to-action button (e.g. "Donate").' }
          - { label: Link URL, name: linkUrl, widget: string, required: false, hint: 'Optional. Where the button goes. Can be a path on this site (e.g. /donate) or a full URL.' }

  # Blog posts — /blog/<slug>
  - name: blog
    label: Blog posts
    label_singular: Blog post
    folder: src/content/blog
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}} — {{date | date(''D MMMM YYYY'')}}'
    sortable_fields: [date, title]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, picker_utc: false }
      - { label: Summary, name: summary, widget: text, required: false, hint: 'Short standfirst shown on listing pages and used as the meta description.' }
      - { label: Cover image, name: cover, widget: image, required: false }
      - { label: Author, name: author, widget: string, required: false }
      - { label: Tags, name: tags, widget: list, required: false, default: [] }
      - { label: Draft, name: draft, widget: boolean, default: false, hint: 'Drafts do not appear on the public site.' }
      - { label: Hide from home page, name: hideFromHome, widget: boolean, default: false, hint: 'Keeps the post in the blog, tags and RSS but hides it from the "Latest news" list on the home page. Use for older news that has gone stale.' }
      - { label: Body, name: body, widget: markdown }

  # Team & trustees — /team/<slug>
  - name: team
    label: Team & trustees
    label_singular: Team member
    folder: src/content/team
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{name}} — {{role}}'
    sortable_fields: [order, name]
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: string, hint: 'e.g. Trustee, Patron, Archivist.' }
      - label: Category
        name: category
        widget: select
        required: false
        options:
          - { label: Trustee, value: trustee }
          - { label: Staff, value: staff }
          - { label: Patron, value: patron }
          - { label: Ambassador, value: ambassador }
          - { label: Advisor, value: advisor }
          - { label: Volunteer, value: volunteer }
      - { label: Former, name: former, widget: boolean, default: false, hint: 'Tick for past trustees / patrons / etc. They appear at the bottom of the team gallery.' }
      - { label: Order, name: order, widget: number, required: false, value_type: int, hint: 'Lower numbers show first on listing pages.' }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Bio, name: body, widget: markdown }

  # Supporters & partners — /partners/<slug>
  - name: partners
    label: Supporters & partners
    label_singular: Supporter / partner
    folder: src/content/partners
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{name}}'
    sortable_fields: [order, name]
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Logo, name: logo, widget: image, hint: 'A logo on a transparent or white background works best.' }
      - { label: Website, name: url, widget: string, required: false, hint: "Optional link to the organisation's own website." }
      - { label: Order, name: order, widget: number, required: false, value_type: int, hint: 'Lower numbers show first.' }
      - { label: Short summary, name: summary, widget: text, required: false, hint: 'One line shown under the name on the detail page.' }
      - { label: Detail, name: body, widget: markdown, hint: 'More about this supporter or partner, shown on their page.' }

  # Archive collections — /collections/<slug>
  # NOTE: the Astro collection is named `archive` but the public URL is
  # /collections/<slug>. The folder must match the Astro collection.
  - name: archive
    label: Archive collections
    label_singular: Archive collection
    folder: src/content/archive
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}}'
    sortable_fields: [order, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Cover image, name: cover, widget: image, required: false }
      - { label: Order, name: order, widget: number, required: false, value_type: int }
      - { label: Body, name: body, widget: markdown }

  # Exhibitions — /exhibitions/<slug>
  - name: exhibitions
    label: Exhibitions
    label_singular: Exhibition
    folder: src/content/exhibitions
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}}'
    sortable_fields: [startDate, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Start date, name: startDate, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, required: false }
      - { label: End date, name: endDate, widget: datetime, date_format: 'YYYY-MM-DD', time_format: false, required: false }
      - { label: Venue, name: venue, widget: string, required: false }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Cover image, name: cover, widget: image, required: false }
      - label: Status
        name: status
        widget: select
        required: false
        options:
          - { label: Upcoming, value: upcoming }
          - { label: Current, value: current }
          - { label: Past, value: past }
      - { label: Body, name: body, widget: markdown }

  # About pages — /about/<slug>
  - name: about
    label: About pages
    label_singular: About page
    folder: src/content/about
    extension: md
    format: frontmatter
    create: true
    slug: '{{slug}}'
    summary: '{{title}}'
    sortable_fields: [order, title]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Order, name: order, widget: number, required: false, value_type: int }
      - { label: Summary, name: summary, widget: text, required: false }
      - { label: Show team gallery, name: showTeam, widget: boolean, default: false, hint: 'Show the team / patrons / trustees gallery underneath the page body. Currently only used on About us.' }
      - { label: Body, name: body, widget: markdown }
      - label: Annual reports
        name: annualReports
        widget: list
        required: false
        label_singular: Annual report
        summary: '{{fields.year}} Annual Report'
        hint: 'Downloadable annual report PDFs, shown beneath the page body. Newest year is listed first automatically.'
        fields:
          - { label: Year, name: year, widget: number, value_type: int }
          - { label: PDF file, name: file, widget: file }
